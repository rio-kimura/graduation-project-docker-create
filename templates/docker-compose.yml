version: '3.8'

services:
  # ----------------------------------------------------------------------------
  # 1. Nginx リバースプロキシ
  # ----------------------------------------------------------------------------
  web_server:
    image: nginx:1.25-alpine
    container_name: web_server
    ports:
      - "8080:80"
    volumes:
      - ../files/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs_app
    networks:
      - app_frontend_net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 2. Next.js 15 アプリケーション（Dockerfile内製化版）
  # ----------------------------------------------------------------------------
  nextjs_app:
    build:
      context: ../files/nextjs_app
      dockerfile: Dockerfile
    container_name: nextjs_app
    # 💡解説: env_fileを廃止し、Composeに直接内包させることで.envファイルを不要化
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=postgresql://postgres:supabase_secure_pass_2026@supabase_db:5432/app_db?schema=public
      # ⚠️ 本番環境では必ず強力なランダム文字列に変更すること (例: openssl rand -base64 32)
      - NEXTAUTH_SECRET=change-this-to-a-strong-random-secret
      - NEXTAUTH_URL=http://10.149.245.115:8080
    depends_on:
      supabase_db:
        condition: service_healthy
    networks:
      - app_frontend_net
      - app_backend_net
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ----------------------------------------------------------------------------
  # 3. Supabase準拠 PostgreSQL データベース
  # ----------------------------------------------------------------------------
  supabase_db:
    image: supabase/postgres:15.1.1.78
    container_name: supabase_db
    # 💡解説: こちらも環境変数を内包化
    environment:
      - POSTGRES_PASSWORD=supabase_secure_pass_2026
      - POSTGRES_DB=app_db
    networks:
      - app_backend_net
    volumes:
      - ./supabase_db_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 1024M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  app_frontend_net:
    driver: bridge
  app_backend_net:
    driver: bridge
